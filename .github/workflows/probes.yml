name: Probe suite (graphics fork)

# The remote dev container has no Godot binary (GitHub downloads are
# proxy-blocked in-session), so the CLAUDE.md probe gate runs here instead:
# headless import + every trusted probe, failing on any FAIL output line.

on:
  push:
    branches: [claude/graphics-upgrade-fork, claude/go-kart-mobile-rainbow-track-8gyatx]
  workflow_dispatch:

env:
  GODOT_RELEASE: "4.4-stable"

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Import (deadlock-guarded)
        run: timeout 12m godot --headless --import . || (echo "IMPORT FAIL (hang or error)" && exit 1)

      - name: Run trusted probes
        run: |
          set -o pipefail
          FAILED=0
          for p in probe_audit probe_passive probe_load probe_mg2d probe_l2 probe_verbs probe_skins; do
            if [ ! -f "scripts/$p.gd" ]; then
              echo "SKIP: scripts/$p.gd not present"
              continue
            fi
            echo "=== $p ==="
            timeout 8m godot --headless -s "scripts/$p.gd" 2>&1 | tee "/tmp/$p.out" || FAILED=1
            if grep -q "FAIL" "/tmp/$p.out"; then
              echo "PROBE $p reported FAIL"
              FAILED=1
            fi
          done
          exit $FAILED
