name: Probe suite (graphics fork)

# The remote dev container has no Godot binary (GitHub downloads are
# proxy-blocked in-session), so the CLAUDE.md probe gate runs here instead:
# headless import + every trusted probe.  Each probe gets a fresh user-data
# directory so a previous probe cannot hide an auto-win or fabricate a load.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: probes-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_RELEASE: "4.4-stable"

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Static gates (parse + Variant-inference lint)
        # a parse error in main.gd makes every probe idle to its 8m timeout
        # and the job dies at the 30m ceiling as an opaque 'cancelled' -
        # catch it here in seconds instead (incidents: tnode, sm2 2026-07-11)
        run: |
          pip install --quiet gdtoolkit==4.* numpy Pillow
          python3 -m gdtoolkit.parser scripts/*.gd scripts/arena/*.gd scripts/games/*.gd
          python3 tools/lint_inference.py scripts/*.gd scripts/arena/*.gd scripts/games/*.gd

      - name: Import (deadlock-guarded)
        run: |
          set -o pipefail
          timeout 12m godot --headless --path . --import 2>&1 | tee /tmp/import.out || (echo "IMPORT FAIL (hang or error)" && exit 1)
          if grep -qE 'SCRIPT ERROR|Invalid assignment of property or key|The tweened property .* does not exist|ERROR:.*(Failed loading resource|Cannot open file|No loader found|Resource file not found)|Parse Error|Compile Error|ERR_FILE_CORRUPT|Error importing|Cannot load resource' /tmp/import.out; then
            echo "IMPORT FAIL (resource or script error)"
            exit 1
          fi

      - name: Roshan full motion cage
        run: python3 tools/audit_motions.py --glb assets/characters/roshan_v4.glb

      - name: Compile-check every script (real analyzer, catches what parse-only cannot)
        # probes only compile scripts the run actually loads; lazily-loaded
        # scripts (galaxy, kart, dev_mode) could still ship inference errors.
        # --check-only runs Godot's full analyzer per file in project context.
        run: |
          FAILED=0
          while IFS= read -r f; do
            if ! OUT=$(timeout 60 godot --headless --check-only --script "$f" 2>&1); then
              echo "COMPILE FAIL: $f"; echo "$OUT" | head -20; FAILED=1
            fi
          done < <(find scripts -name '*.gd')
          exit $FAILED

      - name: Run trusted probes
        run: |
          set -o pipefail
          FAILED=0
          RUNTIME_ERROR_RE='SCRIPT ERROR|Invalid assignment of property or key|The tweened property .* does not exist|ERROR:.*(Failed loading resource|Cannot open file|No loader found|Resource file not found)'
          FAILURE_RE='FAIL|FAILED|TIMEOUT|STUCK|DID NOT|MISSING|SCRIPT ERROR|Parse Error|Compile Error'
          for p in probe_reef_districts probe_audit probe_passive probe_load probe_save_recovery probe_galaxy_state probe_collection probe_mg2d probe_audio probe_dance probe_l2 probe_l2_reenter probe_crown probe_northern probe_human_art_audit probe_train probe_verbs probe_skins probe_touch_look probe_voice probe_kart_feel probe_combat probe_dungeon probe_kitchen_props; do
            if [ ! -f "scripts/$p.gd" ]; then
              echo "PROBE $p MISSING: scripts/$p.gd is required"
              FAILED=1
              continue
            fi
            echo "=== $p ==="
            PROBE_HOME="/tmp/reef-$p"
            rm -rf "$PROBE_HOME"
            mkdir -p "$PROBE_HOME/data" "$PROBE_HOME/config"
            XDG_DATA_HOME="$PROBE_HOME/data" XDG_CONFIG_HOME="$PROBE_HOME/config" \
              timeout 8m godot --headless -s "scripts/$p.gd" -- --touch 2>&1 | tee "/tmp/$p.out" || FAILED=1
            if grep -qE "$FAILURE_RE" "/tmp/$p.out"; then
              echo "PROBE $p reported a failure or runtime script error"
              FAILED=1
            fi
            if grep -qE "Parse Error|Compile Error" "/tmp/$p.out"; then
              echo "PROBE $p hit a script compile error - aborting gate"
              exit 1
            fi
            if grep -qE "$RUNTIME_ERROR_RE" "/tmp/$p.out"; then
              echo "PROBE $p reported a resource or property runtime error"
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Capture first-world visual review
        env:
          REEF_SHOT_OUT: /tmp/reef-shots
          LIBGL_ALWAYS_SOFTWARE: 1
        run: |
          mkdir -p "$REEF_SHOT_OUT"
          # The headless display driver never emits frame_post_draw, so image
          # capture must use a real X11 viewport. Xvfb + software rendering is
          # deterministic on the hosted runner and keeps the project on Mobile.
          timeout 6m xvfb-run -a godot --rendering-method mobile -s scripts/probe_reef_shots.gd

      - name: Upload first-world visual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reef-first-world-review
          path: /tmp/reef-shots/*.png
          if-no-files-found: error

      - name: Capture northern-world visual review
        env:
          NORTH_SHOT_OUT: /tmp/northern-shots
          LIBGL_ALWAYS_SOFTWARE: 1
        run: |
          mkdir -p "$NORTH_SHOT_OUT"
          timeout 6m xvfb-run -a godot --rendering-method mobile -s scripts/probe_northern_art_audit.gd

      - name: Upload northern-world visual review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: northern-world-review
          path: /tmp/northern-shots/*.png
          if-no-files-found: error
