name: Android APK

# Publish only after the probe workflow has passed for the exact commit.
# A single repository secret supplies the persistent debug signing identity;
# replacing that identity would make Android reject in-place updates.
on:
  workflow_run:
    workflows: ["Probe suite (graphics fork)"]
    types: [completed]

concurrency:
  group: android-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  GODOT_VERSION: "4.4"
  GODOT_RELEASE: "4.4-stable"

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'master' ||
        github.event.workflow_run.head_branch == 'claude/graphics-upgrade-fork')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Godot + export templates
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Restore stable signing identity + editor settings
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_DEBUG_KEYSTORE_BASE64 repository secret; refusing to rotate the app signing identity."
            exit 1
          fi
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > /tmp/debug.keystore
          keytool -list -v -keystore /tmp/debug.keystore -storepass android \
            -alias androiddebugkey | grep -E "Alias name:|SHA256:"
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-${GODOT_VERSION}.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project (first run generates .godot resources)
        run: |
          set -o pipefail
          godot --headless --path . --import 2>&1 | tee /tmp/import.out
          if grep -qE "SCRIPT ERROR|Parse Error|Compile Error|ERR_FILE_CORRUPT|Error importing|Failed loading resource|Cannot open file|Cannot load resource" /tmp/import.out; then
            echo "Import reported a resource or script error; APK will not publish."
            exit 1
          fi

      - name: Export debug APK
        run: |
          sed -i "s/^version\/code=.*/version\/code=${GITHUB_RUN_NUMBER}/" export_presets.cfg
          mkdir -p build
          godot --headless --path . --export-debug "Android" build/roshan-reef.apk
          test -s build/roshan-reef.apk
          sha256sum build/roshan-reef.apk > build/roshan-reef.apk.sha256

      # NOTE: no actions/upload-artifact step — each run's ~165MB artifact blew
      # the account's Actions storage quota and, worse, its failure blocked the
      # release-publish step below (the actual download channel). Release
      # assets do not count against the artifact quota.
      - name: Pick release tag by branch (graphics fork gets its own channel)
        id: tag
        env:
          BUILD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$BUILD_BRANCH" = "claude/graphics-upgrade-fork" ]; then
            echo "tag=android-graphics" >> "$GITHUB_OUTPUT"
            echo "title=Android test build (graphics fork)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=android-test" >> "$GITHUB_OUTPUT"
            echo "title=Android build (latest master)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish APK to the prerelease (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.title }}
          prerelease: true
          body: |
            Debug APK of Mermaid Roshan Reef of Light, built only after the probe suite passed.
            Commit: ${{ github.event.workflow_run.head_sha }}
            On the phone: download roshan-reef.apk, open it, and allow "install unknown apps" when prompted.

            Bookmarkable direct link (always the newest build on this channel):
            https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/roshan-reef.apk

            From a computer with the phone plugged in: `./pull-apk.sh`
          files: |
            build/roshan-reef.apk
            build/roshan-reef.apk.sha256
