name: Android APK

# Publish only after the probe workflow has passed for the exact commit.
# A single repository secret supplies the persistent debug signing identity;
# replacing that identity would make Android reject in-place updates.
on:
  workflow_run:
    # ⚠ This matches the probe workflow by its literal `name:` string. Renaming
    # the probe workflow silently stops ALL APK builds — no error, just no
    # builds. If you rename probes.yml's `name:`, update this list in the
    # same commit.
    workflows: ["Probe suite (graphics fork)"]
    types: [completed]

concurrency:
  group: android-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  GODOT_VERSION: "4.4"
  GODOT_RELEASE: "4.4-stable"

jobs:
  build:
    if: >-
      github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'master' ||
        github.event.workflow_run.head_branch == 'dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # full history: version/code below derives from the commit count
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Godot + export templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            godot.zip
            templates.tpz
          key: godot-${{ env.GODOT_RELEASE }}-linux-x86_64

      - name: Download Godot + export templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"

      - name: Install Godot + export templates
        run: |
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Restore stable signing identity + editor settings
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_DEBUG_KEYSTORE_BASE64 repository secret; refusing to rotate the app signing identity."
            exit 1
          fi
          # Normalize the pasted secret before decoding. Every build since the
          # persistent-identity secret landed has died at 'base64: invalid
          # input' even after whitespace stripping, so also repair the other
          # common paste mutations: surrounding quotes, base64url alphabet
          # (-_ for +/), and stripped '=' padding. keytool below still
          # validates keystore integrity, so no repair can smuggle in a
          # corrupt or wrong-identity keystore.
          CLEAN=$(printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" \
            | tr -d ' \t\r\n' \
            | sed -e 's/^["'\'']*//' -e 's/["'\'']*$//' \
            | tr -- '-_' '+/')
          case $(( ${#CLEAN} % 4 )) in
            2) CLEAN="${CLEAN}==" ;;
            3) CLEAN="${CLEAN}=" ;;
          esac
          printf '%s' "$CLEAN" | base64 --decode > /tmp/debug.keystore 2>/dev/null \
            || printf '%s' "$CLEAN" | base64 --decode --ignore-garbage > /tmp/debug.keystore 2>/dev/null \
            || : > /tmp/debug.keystore
          # If the decode produced base64 TEXT of a keystore (double-encoded
          # secret), peel the second layer. JKS base64 starts '/u3+7Q',
          # PKCS12 base64 starts 'MII' - real keystore bytes are not printable.
          if head -c 6 /tmp/debug.keystore | grep -qE '^(/u3\+7Q|MII)'; then
            base64 --decode < /tmp/debug.keystore > /tmp/debug.keystore.inner 2>/dev/null \
              && mv /tmp/debug.keystore.inner /tmp/debug.keystore
          fi
          if ! keytool -list -v -keystore /tmp/debug.keystore -storepass android \
              -alias androiddebugkey | grep -E "Alias name:|SHA256:"; then
            # Diagnostics only - never echo any part of the secret itself.
            RAW_LEN=${#ANDROID_DEBUG_KEYSTORE_BASE64}
            BAD=$(printf '%s' "$CLEAN" | tr -d 'A-Za-z0-9+/=' | wc -c)
            DEC=$(stat -c %s /tmp/debug.keystore 2>/dev/null || echo 0)
            echo "::error::ANDROID_DEBUG_KEYSTORE_BASE64 does not decode to a valid keystore."
            echo "Secret length: ${RAW_LEN} chars (after cleanup: ${#CLEAN}, remainder mod 4: $(( ${#CLEAN} % 4 )))"
            echo "Characters outside the base64 alphabet after cleanup: ${BAD}"
            echo "Decoded size: ${DEC} bytes (a debug keystore is roughly 2000-6000 bytes)"
            case "$ANDROID_DEBUG_KEYSTORE_BASE64" in
              *-----*)        echo "Hint: value looks PEM-armored (-----BEGIN...). Encode the raw .keystore file instead." ;;
              [0-9A-Fa-f][0-9A-Fa-f]:*) echo "Hint: value looks like a certificate FINGERPRINT (AB:CD:...). The secret must be the keystore file's contents, not its fingerprint." ;;
              /*|~*)          echo "Hint: value looks like a file PATH. The secret must be the file's base64-encoded CONTENTS." ;;
            esac
            echo "Re-save the secret with the exact output of:  base64 -w0 debug.keystore"
            echo "(macOS: base64 -i debug.keystore | tr -d '\\n')  Settings > Secrets and variables > Actions > ANDROID_DEBUG_KEYSTORE_BASE64"
            exit 1
          fi
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-${GODOT_VERSION}.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project (first run generates .godot resources)
        run: |
          set -o pipefail
          godot --headless --path . --import 2>&1 | tee /tmp/import.out
          if grep -qE 'SCRIPT ERROR|Invalid assignment of property or key|The tweened property .* does not exist|ERROR:.*(Failed loading resource|Cannot open file|No loader found|Resource file not found)|Parse Error|Compile Error|ERR_FILE_CORRUPT|Error importing|Cannot load resource' /tmp/import.out; then
            echo "IMPORT FAIL (resource or script error)"
            exit 1
          fi

      - name: Export debug APK
        run: |
          # version/code from the commit count, not GITHUB_RUN_NUMBER: run
          # numbers can collide or go BACKWARDS (re-runs, workflow recreation),
          # and Android refuses in-place updates on a lower versionCode — the
          # same save-data-loss failure the keystore care above exists to
          # prevent. Commit count is monotonic on the branch and idempotent
          # when the same commit is rebuilt.
          VERSION_CODE=$(git rev-list --count HEAD)
          echo "version/code=${VERSION_CODE}"
          sed -i "s/^version\/code=.*/version\/code=${VERSION_CODE}/" export_presets.cfg
          mkdir -p build
          godot --headless --path . --export-debug "Android" build/roshan-reef.apk
          test -s build/roshan-reef.apk
          sha256sum build/roshan-reef.apk > build/roshan-reef.apk.sha256

      # NOTE: no actions/upload-artifact step — each run's ~165MB artifact blew
      # the account's Actions storage quota and, worse, its failure blocked the
      # release-publish step below (the actual download channel). Release
      # assets do not count against the artifact quota.
      - name: Pick release tag by branch (dev gets its own pre-promotion channel)
        id: tag
        env:
          BUILD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$BUILD_BRANCH" = "dev" ]; then
            echo "tag=android-dev" >> "$GITHUB_OUTPUT"
            echo "title=Android dev build (integration branch)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=android-test" >> "$GITHUB_OUTPUT"
            echo "title=Android build (latest master)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish APK to the prerelease (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.title }}
          prerelease: true
          body: |
            Debug APK of Mermaid Roshan Reef of Light, built only after the probe suite passed.
            Commit: ${{ github.event.workflow_run.head_sha }}
            On the phone: download roshan-reef.apk, open it, and allow "install unknown apps" when prompted.

            Bookmarkable direct link (always the newest build on this channel):
            https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/roshan-reef.apk

            From a computer with the phone plugged in: `./pull-apk.sh`
          files: |
            build/roshan-reef.apk
            build/roshan-reef.apk.sha256
