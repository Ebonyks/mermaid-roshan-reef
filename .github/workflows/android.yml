name: Android APK

on:
  push:
    branches: [claude/replace-assets-free-sources-lnplz7, claude/graphics-upgrade-fork]
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.4"
  GODOT_RELEASE: "4.4-stable"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Godot + export templates
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Debug keystore + editor settings (Android SDK is preinstalled on the runner)
        run: |
          keytool -genkeypair -v -keystore /tmp/debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-${GODOT_VERSION}.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project (first run generates .godot resources)
        run: godot --headless --path . --import || true

      - name: Export debug APK
        run: |
          mkdir -p build
          godot --headless --path . --export-debug "Android" build/roshan-reef.apk
          ls -la build/

      # NOTE: no actions/upload-artifact step — each run's ~165MB artifact blew
      # the account's Actions storage quota and, worse, its failure blocked the
      # release-publish step below (the actual download channel). Release
      # assets do not count against the artifact quota.
      - name: Pick release tag by branch (graphics fork gets its own channel)
        id: tag
        run: |
          if [ "${GITHUB_REF_NAME}" = "claude/graphics-upgrade-fork" ]; then
            echo "tag=android-graphics" >> "$GITHUB_OUTPUT"
            echo "title=Android test build (graphics fork)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=android-test" >> "$GITHUB_OUTPUT"
            echo "title=Android test build" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish APK to the prerelease (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.title }}
          prerelease: true
          body: |
            Debug APK of Mermaid Roshan Reef of Light (auto-built from the latest push).
            On the phone: download roshan-reef.apk, open it, and allow "install unknown apps" when prompted.
          files: build/roshan-reef.apk
